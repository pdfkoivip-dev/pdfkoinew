[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "http://www.pdfkoi.com/*"
  to = "https://pdfkoi.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.pdfkoi.com/*"
  to = "https://pdfkoi.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://pdfkoi.com/*"
  to = "https://pdfkoi.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/tools"
  to = "/tools/category/edit-annotate"
  status = 301
  force = true
  query = { category = "edit-annotate" }

[[redirects]]
  from = "/tools"
  to = "/tools/category/convert-to-pdf"
  status = 301
  force = true
  query = { category = "convert-to-pdf" }

