[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "http://www.pdfkoi.com/*"
  to = "https://pdfkoi.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.pdfkoi.com/*"
  to = "https://pdfkoi.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://pdfkoi.com/*"
  to = "https://pdfkoi.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/tools"
  to = "/tools/category/edit-annotate"
  status = 301
  force = true
  query = { category = "edit-annotate" }

[[redirects]]
  from = "/tools"
  to = "/tools/category/convert-to-pdf"
  status = 301
  force = true
  query = { category = "convert-to-pdf" }

[[redirects]]
  from = "/tools"
  to = "/tools/category/convert-from-pdf"
  status = 301
  force = true
  query = { category = "convert-from-pdf" }

[[redirects]]
  from = "/tools"
  to = "/tools/category/organize-manage"
  status = 301
  force = true
  query = { category = "organize-manage" }

[[redirects]]
  from = "/tools"
  to = "/tools/category/optimize-repair"
  status = 301
  force = true
  query = { category = "optimize-repair" }

[[redirects]]
  from = "/tools"
  to = "/tools/category/secure-pdf"
  status = 301
  force = true
  query = { category = "secure-pdf" }

[[redirects]]
  from = "/:locale/tools"
  to = "/:locale/tools/category/edit-annotate"
  status = 301
  force = true
  query = { category = "edit-annotate" }

[[redirects]]
  from = "/:locale/tools"
  to = "/:locale/tools/category/convert-to-pdf"
  status = 301
  force = true
  query = { category = "convert-to-pdf" }

[[redirects]]
  from = "/:locale/tools"
  to = "/:locale/tools/category/convert-from-pdf"
  status = 301
  force = true
  query = { category = "convert-from-pdf" }

[[redirects]]
  from = "/:locale/tools"
  to = "/:locale/tools/category/organize-manage"
  status = 301
  force = true
  query = { category = "organize-manage" }

[[redirects]]
  from = "/:locale/tools"
  to = "/:locale/tools/category/optimize-repair"
  status = 301
  force = true
  query = { category = "optimize-repair" }

[[redirects]]
  from = "/:locale/tools"
  to = "/:locale/tools/category/secure-pdf"
  status = 301
  force = true
  query = { category = "secure-pdf" }

[[redirects]]
  from = "/en"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/en/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/zh-TW"
  to = "/zh-tw"
  status = 301
  force = true

[[redirects]]
  from = "/zh-TW/"
  to = "/zh-tw/"
  status = 301
  force = true

[[redirects]]
  from = "/zh-TW/*"
  to = "/zh-tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
